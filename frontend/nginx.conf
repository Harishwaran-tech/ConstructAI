server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Support React Router Single Page Application routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Handle un-proxied API calls with a clean JSON error response instead of HTML index.html
    location /api/ {
        default_type application/json;
        return 404 '{"detail": "Backend API connection error. Ensure VITE_API_URL environment variable is set in Render settings."}';
    }

    # Prevent caching of index.html so browsers always fetch the latest asset hashes
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Cache immutable static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
